site:
  name: AEPI
  site: 'https://tu-dominio-vercel.vercel.app' # IMPORTANTE: Reemplaza esto con la URL que te dio Vercel
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: '' # Lo dejé vacío, se configura después si usas Google Search Console

# Default SEO metadata
metadata:
  title:
    default: AEPI - Centro Multidisciplinario
    template: '%s — AEPI'
  description: "Amar y Educar con Psicología Integral. Especialistas en psicología, nutrición, terapia de lenguaje, estimulación temprana y rehabilitación."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: AEPI
    images:
      - url: '~/assets/images/logo-aepi.png' # Apunta al logo que subiste
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '' # Opcional: Twitter de la clínica
    site: ''
    cardType: summary_large_image

i18n:
  language: es # Cambiado a español para mejor SEO local
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"